<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas → "Save image as" → save as icon-192.png and icon-512.png</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Gradient accent
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#a855f7');
  grad.addColorStop(1, '#3b82f6');
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.15;
  ctx.fillRect(0, 0, s, s);
  ctx.globalAlpha = 1;
  // Brain emoji / K letter
  ctx.fillStyle = '#f0f0f5';
  ctx.font = `bold ${s * 0.45}px Inter, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('K', s/2, s/2 - s*0.02);
  // Accent bar
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(s*0.3, s*0.72, s*0.4, s*0.04);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
